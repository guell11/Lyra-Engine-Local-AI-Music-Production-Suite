            <div class="page feed-page{% if active_page == 'feed' %} active{% endif %}" id="page-feed">
                <div class="feed-header">
                    <h2>Suas Musicas</h2>
                    <div class="feed-toolbar">
                        <div class="search-bar">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                            <input type="text" id="feed-search" placeholder="Buscar no feed...">
                        </div>
                        <select class="feed-sort" id="feed-sort">
                            <option value="newest">Mais Recente</option>
                            <option value="oldest">Mais Antigo</option>
                            <option value="name">Nome A-Z</option>
                            <option value="size">Maior Tamanho</option>
                        </select>
                    </div>
                </div>
                <div class="feed-grid" id="feed-grid">
                    <div class="feed-empty" id="feed-empty">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.8">
                            <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
                        </svg>
                        <h3>Seu feed esta vazio</h3>
                        <p>Crie sua primeira musica na aba "Criar" e ela aparecera aqui.</p>
                    </div>
                </div>
            </div>
